name: Release DMG

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    name: Build and publish macOS DMG
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build DMG
        run: SIGN_IDENTITY="-" ./tools/create_dmg.sh

      - name: Verify release asset
        run: |
          test -f NemoVoiceTyping-1.0.dmg
          hdiutil imageinfo NemoVoiceTyping-1.0.dmg

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" NemoVoiceTyping-1.0.dmg --clobber
          else
            extra_args=()
            if ! git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
              extra_args=(--target "$GITHUB_SHA")
            fi
            gh release create "$TAG_NAME" NemoVoiceTyping-1.0.dmg "${extra_args[@]}" \
              --title "Nemo Voice Typing ${TAG_NAME}" \
              --notes "Download the DMG, drag the app to /Applications, then grant Microphone and Accessibility permissions on first launch."
          fi
