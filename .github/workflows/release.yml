name: Release DMG

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    name: Build and publish macOS DMG
    runs-on: macos-14
    env:
      HAS_MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE_P12 != '' }}
      HAS_NOTARY_CREDENTIALS: ${{ secrets.APPLE_ID != '' && secrets.APPLE_APP_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Import Developer ID certificate
        if: env.HAS_MACOS_CERTIFICATE == 'true'
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning

      - name: Build DMG
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          if [ -n "$MACOS_SIGN_IDENTITY" ]; then
            SIGN_IDENTITY="$MACOS_SIGN_IDENTITY" ./tools/create_dmg.sh
          else
            SIGN_IDENTITY="-" ./tools/create_dmg.sh
          fi

      - name: Notarize and staple DMG
        if: env.HAS_NOTARY_CREDENTIALS == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit NemoVoiceTyping-1.0.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple NemoVoiceTyping-1.0.dmg

      - name: Verify release asset
        run: |
          test -f NemoVoiceTyping-1.0.dmg
          hdiutil imageinfo NemoVoiceTyping-1.0.dmg
          codesign --verify --verbose=2 NemoVoiceTyping-1.0.dmg

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" NemoVoiceTyping-1.0.dmg --clobber
          else
            extra_args=()
            if ! git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
              extra_args=(--target "$GITHUB_SHA")
            fi
            gh release create "$TAG_NAME" NemoVoiceTyping-1.0.dmg "${extra_args[@]}" \
              --title "Nemo Voice Typing ${TAG_NAME}" \
              --notes "Download the DMG, drag the app to /Applications, then grant Microphone and Accessibility permissions on first launch."
          fi
